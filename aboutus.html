<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us | MI&ISK</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --accent: #00e5b4;
  --gold: #c9a84c;
  --bg: #06080b;
  --surface: #0d1117;
  --line: rgba(255,255,255,0.07);
  --dim: #5a6474;
}

body {
  background: var(--bg);
  color: #e8eaf0;
  font-family: 'Syne', sans-serif;
  overflow-x: hidden;
  cursor: none;
}

/* CURSOR */
.cursor {
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: difference;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  opacity: 0.5;
  mix-blend-mode: difference;
  transition: all 0.35s cubic-bezier(0.23,1,0.32,1);
}

/* BG GLOW */
.bg-canvas {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, rgba(0,229,180,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
  z-index: -1;
  pointer-events: none;
}

/* NAV */
nav {
  position: fixed; width: 100%;
  padding: 28px 8%;
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(to bottom, rgba(6,8,11,0.95), transparent);
  backdrop-filter: blur(2px);
  z-index: 100;
}

.brand {
  font-family: 'Bebas Neue';
  font-size: 1.5rem;
  letter-spacing: 8px;
  color: var(--gold);
}

.nav-links a {
  text-decoration: none;
  color: var(--dim);
  font-family: 'DM Mono';
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--accent); }

/* PAGE */
.about-wrapper {
  min-height: 100vh;
  padding: 160px 8% 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TITLE */
.title-area {
  text-align: center;
  margin-bottom: 90px;
}

.title-eyebrow {
  font-family: 'DM Mono';
  font-size: 0.65rem;
  letter-spacing: 5px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.title-eyebrow::before,
.title-eyebrow::after {
  content: '';
  width: 40px; height: 1px;
  background: var(--accent);
  opacity: 0.4;
}

.title-area h1 {
  font-family: 'Bebas Neue';
  font-size: clamp(3.5rem, 8vw, 6rem);
  letter-spacing: 6px;
  line-height: 1;
  color: #fff;
}

.title-area h1 span {
  -webkit-text-stroke: 1px var(--gold);
  color: transparent;
}

.title-sub {
  font-family: 'DM Mono';
  font-size: 0.75rem;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 16px;
}

/* GRID */
.student-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 2px;
  width: 100%;
  max-width: 1000px;
  background: var(--line);
}

/* CARD */
.card {
  background: var(--bg);
  padding: 50px 44px;
  text-decoration: none;
  color: #e8eaf0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
  cursor: none;
  transition: background 0.4s;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,229,180,0.04), rgba(201,168,76,0.03));
  opacity: 0;
  transition: opacity 0.4s;
}
.card:hover::before { opacity: 1; }
.card:hover { background: var(--surface); }

/* PHOTO */
.img-wrap {
  position: relative;
  width: 130px; height: 130px;
  margin-bottom: 28px;
}

.img-wrap img {
  width: 100%; height: 100%;
  border-radius: 4px;
  object-fit: cover;
  object-position: top;
  filter: grayscale(15%) contrast(1.05);
  display: block;
  transition: filter 0.4s, transform 0.4s;
}

.card:hover .img-wrap img {
  filter: grayscale(0%) contrast(1.1);
  transform: scale(1.04);
}

/* ✅ FIX ONLY ISKANDAR IMAGE */
img[src="is.jpeg"] {
  object-position: center 20%;
}

/* OTHER STYLES CONTINUE... */
footer {
  margin-top: 80px;
  font-family: 'DM Mono';
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
  opacity: 0.5;
}
</style>
</head>

<body>

<section class="about-wrapper">

<div class="student-grid">

<a href="mior.html" class="card">
  <div class="img-wrap">
    <img src="MIOR.jpeg" alt="Mior">
  </div>
  <div class="card-name">Mior Ikmal</div>
</a>

<a href="iskandar.html" class="card">
  <div class="img-wrap">
    <img src="is.jpeg" alt="Iskandar">
  </div>
  <div class="card-name">Iskandar Z.</div>
</a>

</div>

</section>

</body>
</html>
