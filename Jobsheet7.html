<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Your Travels</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #E6E9F2;
    }

    nav {
      background: #3F51B5;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      width: 850px;
      margin: 30px auto;
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    #featured {
      position: relative;
      border: 1px solid #eee;
      overflow: hidden;
    }

    #featured img {
      width: 100%;
      height: 500px;
      object-fit: cover;
    }

    #featured figcaption {
      position: absolute;
      bottom: 0;
      background: rgba(230, 230, 230, 0.85);
      color: #333;
      width: 100%;
      padding: 15px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      opacity: 0;
      transition: 0.4s;
    }

    #featured:hover figcaption {
      opacity: 1;
    }

    #thumbnails {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    #thumbnails img {
      width: 18.5%;
      height: 120px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    #thumbnails img:hover {
      border: 2px solid #3F51B5;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <nav>
    <div>Share Your Travels</div>
    <div>&#9776;</div>
  </nav>

  <div class="container">

    <figure id="featured">
      <img id="mainImage" src="afamosa.avif" title="A'Famosa Fort">
      <figcaption id="caption">A'Famosa Fort</figcaption>
    </figure>

    <div id="thumbnails">
      <img src="afamosa.avif" title="A'Famosa Fort">
      <img src="jonker.jpg" title="Jonker Street Night Market Melaka">
      <img src="menara.jpeg" title="Menara Taming Sari">
      <img src="bandar.png" title="Bandar Hilir">
      <img src="river.jpeg" title="River Cruise Melaka">
    </div>

  </div>

  <!-- LINK JS FILE -->
  <script src="script.js"></script>

</body>
</html>
