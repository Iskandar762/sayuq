<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f5f5f5;
    }
    h2 {
        text-align: left;
        margin-bottom: 20px;
        margin-left: 10%;
    }
    table {
        width: 80%;
        margin: 0 auto;
        border-collapse: collapse;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
        padding: 12px 15px;
        border: 1px solid #ddd;
        text-align: left;
    }
    th {
        background-color: #f39c12;
        color: #fff;
    }
    td img {
        width: 60px;
        height: auto;
        display: block;
        margin: 0 auto;
    }
    td.product-name {
        text-align: left;
        padding-left: 10px;
    }
    .quantity input {
        width: 40px;
        text-align: center;
    }
    .totals td {
        text-align: right;
        font-weight: bold;
    }
    .grand-total {
        color: red;
        font-size: 1.2em;
    }
    button {
        padding: 4px 10px;
        cursor: pointer;
        background-color: #eee;
        border: 1px solid #ccc;
    }
    button:hover {
        background-color: #ddd;
    }
</style>
</head>
<body>

<h2>Shopping Cart</h2>
<table id="cart">
    <thead>
        <tr>
            <th colspan="2">Product</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="product-image">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Meisje_met_de_parel.jpg" alt="Girl with a Pearl Earring">
            </td>
            <td class="product-name">Girl with a Pearl Earring</td>
            <td class="quantity">
                <button class="minus">-</button>
                <input type="number" value="0" min="0">
                <button class="plus">+</button>
            </td>
            <td class="price">RM80.00</td>
            <td class="amount">RM0.00</td>
        </tr>
        <tr>
            <td class="product-image">
                <img src="1.jpeg" alt="Artist Holding a Thistle">
            </td>
            <td class="product-name">Artist Holding a Thistle</td>
            <td class="quantity">
                <button class="minus">-</button>
                <input type="number" value="0" min="0">
                <button class="plus">+</button>
            </td>
            <td class="price">RM125.00</td>
            <td class="amount">RM0.00</td>
        </tr>
        <tr>
            <td class="product-image">
                <img src="2.jpeg" alt="Portrait of Eleonora of Toledo">
            </td>
            <td class="product-name">Portrait of Eleonora of Toledo</td>
            <td class="quantity">
                <button class="minus">-</button>
                <input type="number" value="0" min="0">
                <button class="plus">+</button>
            </td>
            <td class="price">RM75.00</td>
            <td class="amount">RM0.00</td>
        </tr>
    </tbody>
    <tfoot>
        <tr class="totals">
            <td colspan="4">Subtotal</td>
            <td id="subtotal">RM0.00</td>
        </tr>
        <tr class="totals">
            <td colspan="4">Tax (10%)</td>
            <td id="tax">RM0.00</td>
        </tr>
        <tr class="totals">
            <td colspan="4">Shipping</td>
            <td id="shipping">RM40.00</td>
        </tr>
        <tr class="totals">
            <td colspan="4" class="grand-total">Grand Total</td>
            <td id="grandTotal" class="grand-total">RM40.00</td>
        </tr>
    </tfoot>
</table>

<script>
const cart = document.getElementById('cart');
const TAX_RATE = 0.10;
const SHIPPING = 40.00;

// Fungsi untuk format RM
function formatRM(amount) {
    return 'RM' + amount.toFixed(2);
}

// Fungsi utama kemas kini cart
function updateCart() {
    let subtotal = 0;
    const rows = cart.querySelectorAll('tbody tr');
    
    rows.forEach(row => {
        const qtyInput = row.querySelector('input');
        
        // Guna .replace('RM', '') supaya boleh tukar ke nombor
        const priceText = row.querySelector('.price').textContent.replace('RM', '');
        const price = parseFloat(priceText);
        
        const quantity = parseInt(qtyInput.value) || 0;
        const amount = price * quantity;
        
        row.querySelector('.amount').textContent = formatRM(amount);
        subtotal += amount;
    });

    const tax = subtotal * TAX_RATE;
    const grandTotal = subtotal + tax + SHIPPING;

    document.getElementById('subtotal').textContent = formatRM(subtotal);
    document.getElementById('tax').textContent = formatRM(tax);
    document.getElementById('shipping').textContent = formatRM(SHIPPING);
    document.getElementById('grandTotal').textContent = formatRM(grandTotal);
}

// Event delegation untuk butang + dan -
cart.addEventListener('click', (e) => {
    if(e.target.classList.contains('plus') || e.target.classList.contains('minus')){
        const input = e.target.parentElement.querySelector('input');
        let value = parseInt(input.value) || 0;
        
        if(e.target.classList.contains('plus')){
            value++;
        } else if(e.target.classList.contains('minus') && value > 0){
            value--;
        }
        
        input.value = value;
        updateCart();
    }
});

// Event untuk input manual (taip sendiri nombor)
cart.addEventListener('input', (e) => {
    if(e.target.tagName === 'INPUT'){
        if(e.target.value < 0 || e.target.value === "") e.target.value = 0;
        updateCart();
    }
});

// Jalankan kiraan awal
updateCart();
</script>

</body>
</html>
